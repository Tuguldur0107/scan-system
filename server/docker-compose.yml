version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scan_system
      POSTGRES_USER: scan_user
      POSTGRES_PASSWORD: scan_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://scan_user:scan_pass@postgres:5432/scan_system
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      - postgres

volumes:
  pgdata:
