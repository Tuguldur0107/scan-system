org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation is incompatible with SUBST-mapped drives that
# point to a different root than PUB_CACHE (scripts\run_android.ps1 uses both
# W:\app and C:\FlutterPubCache, which Kotlin's RelocatableFileToPathConverter
# cannot relativize against). Disable it to avoid "different roots" errors.
kotlin.incremental=false
kotlin.caching.enabled=false
